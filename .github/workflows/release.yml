name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the release (e.g., v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows
            runner: windows-latest
            suffix: .exe
          - target: linux
            runner: ubuntu-latest
            suffix: ''

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-key: ${{ matrix.target }}

      - name: Install OpenSSL (Linux)
        if: matrix.target == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev

      - name: Build release
        run: cargo build --release

      - name: Prepare artifact (Windows)
        if: matrix.target == 'windows'
        run: |
          mkdir -p release
          copy target\release\rust-proxy.exe release\rust-proxy.exe

      - name: Prepare artifact (Linux)
        if: matrix.target == 'linux'
        run: |
          mkdir -p release
          cp target/release/rust-proxy release/rust-proxy

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-proxy-${{ matrix.target }}
          path: release/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: |
            artifacts/rust-proxy-windows/rust-proxy.exe
            artifacts/rust-proxy-linux/rust-proxy
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}