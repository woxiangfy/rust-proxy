name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the release (e.g., v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build-windows-msvc:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-key: x86_64-pc-windows-msvc

      - name: Build release
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Prepare artifact directory
        run: mkdir -p release

      - name: Copy binary
        run: cp target/x86_64-pc-windows-msvc/release/rust-proxy.exe release/rust-proxy.exe

      - name: Create tar.gz
        run: cd release && tar -czf ../rust-proxy-x86_64-pc-windows-msvc.tar.gz rust-proxy.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-proxy-x86_64-pc-windows-msvc
          path: rust-proxy-x86_64-pc-windows-msvc.tar.gz

  build-windows-gnu:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-key: x86_64-pc-windows-gnu

      - name: Install MinGW
        run: choco install mingw -y

      - name: Build release
        run: cargo build --release --target x86_64-pc-windows-gnu

      - name: Prepare artifact directory
        run: mkdir -p release

      - name: Copy binary
        run: cp target/x86_64-pc-windows-gnu/release/rust-proxy.exe release/rust-proxy.exe

      - name: Create tar.gz
        run: cd release && tar -czf ../rust-proxy-x86_64-pc-windows-gnu.tar.gz rust-proxy.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-proxy-x86_64-pc-windows-gnu
          path: rust-proxy-x86_64-pc-windows-gnu.tar.gz

  build-linux-gnu:
    runs-on: ubuntu-latest
    container: ubuntu:20.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install system dependencies
        run: apt-get update && apt-get install -y curl build-essential libssl-dev openssl

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-key: x86_64-unknown-linux-gnu

      - name: Build release
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Prepare artifact directory
        run: mkdir -p release

      - name: Copy binary
        run: cp target/x86_64-unknown-linux-gnu/release/rust-proxy release/rust-proxy

      - name: Create tar.gz
        run: cd release && tar -czf ../rust-proxy-x86_64-unknown-linux-gnu.tar.gz rust-proxy

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-proxy-x86_64-unknown-linux-gnu
          path: rust-proxy-x86_64-unknown-linux-gnu.tar.gz

  build-linux-musl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-key: x86_64-unknown-linux-musl

      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build release
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Prepare artifact directory
        run: mkdir -p release

      - name: Copy binary
        run: cp target/x86_64-unknown-linux-musl/release/rust-proxy release/rust-proxy

      - name: Create tar.gz
        run: cd release && tar -czf ../rust-proxy-x86_64-unknown-linux-musl.tar.gz rust-proxy

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-proxy-x86_64-unknown-linux-musl
          path: rust-proxy-x86_64-unknown-linux-musl.tar.gz

  release:
    needs: [build-windows-msvc, build-windows-gnu, build-linux-gnu, build-linux-musl]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: |
            artifacts/rust-proxy-x86_64-pc-windows-msvc/rust-proxy-x86_64-pc-windows-msvc.tar.gz
            artifacts/rust-proxy-x86_64-pc-windows-gnu/rust-proxy-x86_64-pc-windows-gnu.tar.gz
            artifacts/rust-proxy-x86_64-unknown-linux-gnu/rust-proxy-x86_64-unknown-linux-gnu.tar.gz
            artifacts/rust-proxy-x86_64-unknown-linux-musl/rust-proxy-x86_64-unknown-linux-musl.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
